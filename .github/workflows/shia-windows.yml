name: shia-windows
on:
  workflow_dispatch:

env:
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  UPLOAD_ARTIFACT: "true"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-for-windows-flutter:
    name: windows-x86_64 (shia migon)
    needs: [generate-bridge]
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-pc-windows-msvc, arch: x86_64, vcpkg-triplet: x64-windows-static }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Brand client (server + key + name)  ==  Shia Migon
        shell: bash
        run: |
          CFG=libs/hbb_common/src/config.rs
          # server + key
          sed -i 's|rs-ny.rustdesk.com|188.245.173.248|g' "$CFG"
          sed -i 's|OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=|kC9HClDkLNY8xdTjFr8oLokCw3m6J5h+tsLKRmxJrXY=|g' "$CFG"
          # app name (paths/identifiers/window title) -> cmigun
          sed -i 's|RwLock::new("RustDesk".to_owned())|RwLock::new("cmigun".to_owned())|' "$CFG"
          # Windows file properties (Product/Company/Description)
          RC=flutter/windows/runner/Runner.rc
          sed -i 's|Purslane Ltd|cmigun|g' "$RC"
          sed -i 's|RustDesk Remote Desktop|cmigun Remote Support|g' "$RC"
          sed -i 's|"ProductName", "RustDesk"|"ProductName", "cmigun"|g' "$RC"
          echo "=== branded constants ==="
          grep -nE "RENDEZVOUS_SERVERS|RS_PUB_KEY|APP_NAME" "$CFG" | head
          grep -nE "ProductName|CompanyName|FileDescription" "$RC" | head

      - name: Inject minimalist incoming-only mode + app name (runtime)
        shell: bash
        run: |
          python3 - <<'PY'
          f = "src/common.rs"
          s = open(f, encoding="utf-8").read()
          needle = "pub fn load_custom_client() {"
          assert needle in s, "load_custom_client not found!"
          inject = needle + "\n" + "\n".join([
              '    *config::APP_NAME.write().unwrap() = "cmigun".to_owned();',
              '    {',
              '        let mut h = config::HARD_SETTINGS.write().unwrap();',
              '        h.insert("conn-type".to_owned(), "incoming".to_owned());',
              '        h.insert("disable-settings".to_owned(), "Y".to_owned());',
              '        h.insert("disable-installation".to_owned(), "Y".to_owned());',
              '        h.insert("disable-account".to_owned(), "Y".to_owned());',
              '        h.insert("disable-ab".to_owned(), "Y".to_owned());',
              '    }',
          ])
          s = s.replace(needle, inject, 1)
          open(f, "w", encoding="utf-8").write(s)
          print("injected: cmigun + incoming-only + disabled settings/install/account/ab")
          PY
          echo "=== verify injection ==="
          grep -n -A12 "pub fn load_custom_client() {" src/common.rs | head -14

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@1a3da29f56261a1e1f937ec88f0856a9b8321d7e # v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225 # v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"

      # NOTE: rust-cache intentionally removed — it doesn't invalidate on the
      # sed-based source branding, which caused a stale (RustDesk-named) compile.

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.job.vcpkg-triplet }}
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg install --triplet ${{ matrix.job.vcpkg-triplet }} --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do echo "$_1:"; cat "$_1"; echo ""; done
            exit 1
          fi

      - name: Build rustdesk (Shia Migon)
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

      - name: Upload unsigned branded client
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shia-migon-windows-${{ matrix.job.arch }}
          path: rustdesk
